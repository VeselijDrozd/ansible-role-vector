---
- name: Prepare
  hosts: all
  gather_facts: false
  tasks:
    - name: Ensure python3 is present on all instances
      ansible.builtin.raw: |
        if [ -x /usr/bin/apt-get ]; then
          apt-get update && apt-get install -y python3
        elif [ -x /usr/bin/yum ]; then
          yum install -y python3
        fi
      changed_when: false

    - name: Verify python3 binary exists
      ansible.builtin.raw: test -x /usr/bin/python3
      register: python_check
      ignore_errors: true
      changed_when: false

    - name: Fail if python3 was not installed
      ansible.builtin.fail:
        msg: "Python3 installation failed, cannot continue prepare stage"
      when: python_check.rc != 0

    - name: Gather facts
      ansible.builtin.setup:

    - name: Install openssh and python3 on all systems
      block:
        - name: For RedHat
          ansible.builtin.yum:
            name:
              - openssh-server
              - openssh-clients
              - python3
            state: present
            skip_broken: true
          when: ansible_facts['os_family'] | default('') == 'RedHat'

        - name: For Debian
          ansible.builtin.apt:
            name:
              - openssh-server
              - openssh-client
              - python3
            state: present
            update_cache: true
          environment:
            DEBIAN_FRONTEND: noninteractive
          when: ansible_facts['os_family'] | default('') == 'Debian'
      ignore_errors: true
