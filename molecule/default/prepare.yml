---
- name: Prepare
  hosts: all
  gather_facts: false
  tasks:
    - name: Gather facts
      ansible.builtin.setup:
      ignore_errors: true

    - name: Install python3 on Debian first
      ansible.builtin.raw: |
        apt-get update && apt-get install -y python3 2>/dev/null || true
      when: inventory_hostname.split('-')[0] in ['ubuntu', 'debian']
      changed_when: false
      failed_when: false

    - name: Gather facts again
      ansible.builtin.setup:
      ignore_errors: true

    - name: Install openssh and python3 on all systems
      block:
        - name: For RedHat
          ansible.builtin.yum:
            name:
              - openssh-server
              - openssh-clients
              - python3
            state: present
            skip_broken: true
          when: ansible_facts['os_family'] | default('') == 'RedHat'

        - name: For Debian
          ansible.builtin.apt:
            name:
              - openssh-server
              - openssh-client
              - python3
            state: present
            update_cache: true
          environment:
            DEBIAN_FRONTEND: noninteractive
          when: ansible_facts['os_family'] | default('') == 'Debian'
      ignore_errors: true
