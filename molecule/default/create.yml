---
- name: Create
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - name: Create docker network
      community.docker.docker_network:
        name: molecule-vector
        state: present

    - name: Create molecule instances
      community.docker.docker_container:
        name: "{{ item.name }}"
        image: "{{ item.image }}"
        state: started
        recreate: false
        log_driver: json-file
        command: "{{ item.command | default('/usr/sbin/init') }}"
        volumes:
          - /sys/fs/cgroup:/sys/fs/cgroup:rshared
        networks:
          - name: molecule-vector
        cgroupns_mode: "{{ item.cgroupns_mode | default('host') }}"
        env: "{{ item.env | default({}) }}"
        platform: linux/amd64
      loop: "{{ molecule_yml.platforms }}"
      register: server

    - name: Wait for containers to start
      ansible.builtin.wait_for:
        timeout: 30

    - name: Populate instance config dict
      block:
        - name: Collect container info
          community.docker.docker_container_info:
            name: "{{ item.name }}"
          loop: "{{ molecule_yml.platforms }}"
          register: container_info

        - name: Build instance config list
          ansible.builtin.set_fact:
            instance_conf: []

        - name: Add container to config
          ansible.builtin.set_fact:
            instance_conf: "{{ instance_conf + [item_config] }}"
          vars:
            item_config:
              instance: "{{ item.item.name }}"
              address: "{{ item.container.NetworkSettings.Networks.get('molecule_vector', {}).get('IPAddress', '127.0.0.1') }}"
              user: root
              port: 22
              identity_file: ""
          loop: "{{ container_info.results }}"
          when: item.container is defined

    - name: Dump instance config
      ansible.builtin.copy:
        content: |
          # Molecule managed

          {{ instance_conf | to_json | from_json | to_yaml }}
        dest: "{{ molecule_instance_config }}"
        mode: "0600"
